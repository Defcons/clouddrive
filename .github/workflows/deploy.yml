name: Deploy CloudDrive
# Auto-deploys on push to master via Tailscale

on:
  push:
    branches:
      - master

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Deploy via SSH over Tailscale
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/clouddrive
            # The repo is public — fetch anonymously over HTTPS so the deploy
            # doesn't depend on a deploy key/token (a broken remote previously
            # made git fetch fail silently and ship stale code).
            git remote set-url origin https://github.com/Defcons/clouddrive.git
            git fetch origin
            git reset --hard origin/master
            git log -1 --oneline
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env created from example — update credentials!"
            fi
            docker compose up --build --force-recreate -d
