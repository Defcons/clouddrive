name: Deploy CloudDrive
# Auto-deploys on push to master

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            whoami
            cd /opt/clouddrive
            pwd
            git fetch origin 2>&1
            git reset --hard origin/master 2>&1
            git log --oneline -1
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env created from example — update credentials!"
            fi
            docker compose up --build --force-recreate -d 2>&1
