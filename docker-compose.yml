services:
  clouddrive:
    build: .
    container_name: clouddrive
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /data:/data
    env_file:
      - .env
    environment:
      - STORAGE_ROOT=/data
      - PORT=8080

  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    hostname: clouddrive-server
    ports:
      - "8384:8384"    # Syncthing Web UI
      - "22000:22000/tcp"  # Sync protocol (TCP)
      - "22000:22000/udp"  # Sync protocol (QUIC)
      - "21027:21027/udp"  # Discovery
    volumes:
      - /data:/var/syncthing/data
      - /opt/syncthing-config:/var/syncthing/config
    environment:
      - PUID=1000
      - PGID=1000
